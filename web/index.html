<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intercooler Spray Controller</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel">
        <div class="topbar">
          <div>
            <p class="eyebrow">by Vladislav</p>
            <h1>Intercooler Spray Controller</h1>
          </div>
          <div class="system-state" id="systemState">
            <span class="status-dot"></span>
            <span>Готов</span>
          </div>
        </div>

        <div class="sensor-grid" aria-label="Показания датчиков">
          <article class="sensor-card hot">
            <div class="sensor-meta">
              <span>Температура впуска</span>
              <strong id="intakeTemp">42</strong>
            </div>
            <div class="sensor-unit">&deg;C</div>
            <div class="sensor-bar">
              <span id="tempBar"></span>
            </div>
          </article>

          <article class="sensor-card rpm">
            <div class="sensor-meta">
              <span>Обороты двигателя</span>
              <strong id="engineRpm">2800</strong>
            </div>
            <div class="sensor-unit">RPM</div>
            <div class="sensor-bar">
              <span id="rpmBar"></span>
            </div>
          </article>

          <article class="sensor-card throttle">
            <div class="sensor-meta">
              <span>Положение дросселя</span>
              <strong id="throttlePos">31</strong>
            </div>
            <div class="sensor-unit">%</div>
            <div class="sensor-bar">
              <span id="throttleBar"></span>
            </div>
          </article>
        </div>
      </section>

      <section class="control-layout">
        <article class="settings-panel">
          <div class="section-title">
            <p class="eyebrow">Auto mode</p>
            <h2>Пороги автоматического включения</h2>
          </div>

          <label class="toggle-row">
            <span>
              <strong>Автоматическое орошение</strong>
              <small>Насос включается выше всех порогов включения и выключается ниже любого порога отключения</small>
            </span>
            <input id="autoMode" type="checkbox" checked>
          </label>

          <div class="condition-list">
            <div class="condition-group">
              <h3>Температура впуска</h3>
              <label class="condition">
                <span class="condition-head">
                  <strong>Порог включения</strong>
                  <output id="tempOnOut">55 &deg;C</output>
                </span>
                <input id="tempOn" type="range" min="20" max="100" value="55">
              </label>
              <label class="condition">
                <span class="condition-head">
                  <strong>Порог отключения</strong>
                  <output id="tempOffOut">48 &deg;C</output>
                </span>
                <input id="tempOff" type="range" min="20" max="100" value="48">
              </label>
            </div>

            <div class="condition-group">
              <h3>Обороты двигателя</h3>
              <label class="condition">
                <span class="condition-head">
                  <strong>Порог включения</strong>
                  <output id="rpmOnOut">3200 RPM</output>
                </span>
                <input id="rpmOn" type="range" min="800" max="8000" step="100" value="3200">
              </label>
              <label class="condition">
                <span class="condition-head">
                  <strong>Порог отключения</strong>
                  <output id="rpmOffOut">2600 RPM</output>
                </span>
                <input id="rpmOff" type="range" min="800" max="8000" step="100" value="2600">
              </label>
            </div>

            <div class="condition-group">
              <h3>Положение дросселя</h3>
              <label class="condition">
                <span class="condition-head">
                  <strong>Порог включения</strong>
                  <output id="throttleOnOut">45 %</output>
                </span>
                <input id="throttleOn" type="range" min="0" max="100" value="45">
              </label>
              <label class="condition">
                <span class="condition-head">
                  <strong>Порог отключения</strong>
                  <output id="throttleOffOut">30 %</output>
                </span>
                <input id="throttleOff" type="range" min="0" max="100" value="30">
              </label>
            </div>
          </div>
        </article>

        <article class="manual-panel">
          <div class="section-title">
            <p class="eyebrow">Manual override</p>
            <h2>Ручное орошение</h2>
          </div>

          <button class="spray-button" id="manualSpray" type="button" aria-pressed="false">
            <span class="spray-ripple"></span>
            <span class="spray-icon" aria-hidden="true"></span>
            <span class="spray-label">Удерживать</span>
          </button>

          <div class="pump-readout">
            <span>Насос</span>
            <strong id="pumpState">Выключен</strong>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
